name: Web Tests - SauceDemo

on:
  push:
    branches: [main, develop]
    paths:
      - 'web/**'
      - '.github/workflows/web-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  web-tests:
    name: SauceDemo E2E Suite
    runs-on: ubuntu-latest

    env:
      HEADLESS: 'true'
      BROWSER: chrome

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: web/requirements.txt

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        working-directory: web
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: web
        run: pytest --alluredir=allure-results --html=report.html --self-contained-html

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-html-report
          path: web/report.html
          retention-days: 14

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-allure-results
          path: web/allure-results
          retention-days: 14

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-failure-screenshots
          path: web/screenshots
          retention-days: 14
