name: API Tests - Petstore

on:
  push:
    branches: [main, develop]
    paths:
      - 'api/**'
      - '.github/workflows/api-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'api/**'
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  api-tests:
    name: Petstore API Suite
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        working-directory: api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: api
        run: pytest --alluredir=allure-results --html=report.html --self-contained-html

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-html-report-py${{ matrix.python-version }}
          path: api/report.html
          retention-days: 14

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-allure-results-py${{ matrix.python-version }}
          path: api/allure-results
          retention-days: 14
