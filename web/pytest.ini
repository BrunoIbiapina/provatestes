[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    smoke: testes essenciais
    regression: testes completos
    login: cenarios de login
    cart: cenarios de carrinho
    checkout: cenarios de checkout
    negative: cenarios negativos
addopts =
    -v
    --tb=short
    --strict-markers
    --alluredir=allure-results
    --html=report.html
    --self-contained-html
